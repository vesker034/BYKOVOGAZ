<header class="site-header">
    <div class="site-header__top d-none d-md-block">
        <div class="site-container site-header__top-inner">
            <ul class="site-header__contacts">
                <li>
                    <a href="tel:+78001234567">8 (800) 123-45-67</a>
                    <span class="text-white-50 ms-1">— круглосуточно</span>
                </li>
                <li>
                    <a href="mailto:info@bykovogaz.ru">info@bykovogaz.ru</a>
                </li>
            </ul>
            <p class="mb-0 text-white-50 small">
                Поставка и обслуживание газоснабжения
            </p>
        </div>
    </div>

    <div class="site-header__main">
        <nav class="navbar navbar-expand-lg navbar-light" aria-label="Основное меню">
            <div class="site-container d-flex flex-wrap align-items-center justify-content-between gap-3">
                <a class="navbar-brand d-flex align-items-center gap-2 mb-0" href="{% url 'main:home' %}">
                    <span class="navbar-brand__accent" aria-hidden="true">●</span>
                    <span>Быково<span class="text-body-secondary">Газ</span></span>
                </a>

                <button
                    class="navbar-toggler"
                    type="button"
                    data-bs-toggle="collapse"
                    data-bs-target="#siteNavbar"
                    aria-controls="siteNavbar"
                    aria-expanded="false"
                    aria-label="Открыть меню"
                >
                    <span class="navbar-toggler-icon"></span>
                </button>

                <div class="collapse navbar-collapse justify-content-lg-end" id="siteNavbar">
                    <ul class="navbar-nav align-items-lg-center me-lg-3">
                        <li class="nav-item">
                            <a
                                class="nav-link{% if request.resolver_match and request.resolver_match.url_name == 'home' %} active{% endif %}"
                                href="{% url 'main:home' %}"
                                {% if request.resolver_match and request.resolver_match.url_name == 'home' %}aria-current="page"{% endif %}
                            >
                                Главная
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="#">О компании</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="#">Новости</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="#">Контакты</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="#">Карьера</a>
                        </li>
                    </ul>
                    <a class="btn btn-cta btn-sm px-4" href="#">Заказать услугу</a>
                </div>
            </div>
        </nav>
    </div>
</header>
